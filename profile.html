<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MITEC Worker Profile</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --mitec-blue: #0f4a82;
      --card: #ffffff;
      --text: #1d1d1f;
      --muted: #86868b;
      --line: #d2d2d7;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { 
      margin: 0; padding: 20px 16px 120px; background: var(--bg); 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text);
    }

    .shell { max-width: 440px; margin: 0 auto; }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .brand-img { height: 30px; }
    .header-photo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

    .card { background: var(--card); border-radius: 24px; padding: 24px; margin-bottom: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
    
    .profile-hero { text-align: center; padding: 10px 0 20px; }
    .main-photo { 
      width: 140px; height: 140px; border-radius: 28px; object-fit: cover; 
      background: #eee; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }
    
    .worker-name { font-size: 22px; font-weight: 800; margin: 0; color: var(--mitec-blue); text-transform: uppercase; }
    .worker-id { font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 4px; }

    .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: 0.1em; margin: 25px 0 12px 6px; }

    .info-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f2f2f7; }
    .info-row:last-child { border-bottom: none; }
    .label { font-size: 12px; font-weight: 600; color: var(--muted); }
    .value { font-size: 13px; font-weight: 700; color: var(--text); text-align: right; max-width: 60%; }

    .file-btn { color: var(--mitec-blue); text-decoration: none; font-weight: 700; border: 1px solid var(--line); padding: 4px 12px; border-radius: 8px; font-size: 11px; }

    .logout-btn { 
      width: 100%; padding: 16px; border: none; border-radius: 18px; 
      background: #ff3b30; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    }

    .bottom-nav {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 40px); max-width: 380px;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
      border-radius: 100px; display: flex; justify-content: space-around;
      padding: 10px; z-index: 1000;
    }
    .nav-item { color: #fff; text-decoration: none; font-size: 20px; padding: 10px; opacity: 0.4; }
    .nav-item.active { opacity: 1; }
  </style>
</head>
<body>

  <div class="shell">
    <header class="header">
      <img class="brand-img" src="https://mitec.com.my/static/img/logos/mitec-new-logo.png">
      <img id="headerPhoto" class="header-photo" src="https://via.placeholder.com/80">
    </header>

    <div class="card profile-hero">
      <img id="mainPhoto" class="main-photo" src="https://via.placeholder.com/200?text=PHOTO">
      <h1 id="dispName" class="worker-name">LOADING...</h1>
      <div id="dispID" class="worker-id">--</div>
    </div>

    <span class="section-title">Personal Details</span>
    <div class="card">
      <div class="info-row"><span class="label">Email</span><span class="value" id="valEmail">-</span></div>
      <div class="info-row"><span class="label">Phone</span><span class="value" id="valPhone">-</span></div>
      <div class="info-row"><span class="label">Gender</span><span class="value" id="valGender">-</span></div>
      <div class="info-row"><span class="label">Address</span><span class="value" id="valAddress">-</span></div>
    </div>

    <span class="section-title">Banking & Work</span>
    <div class="card">
      <div class="info-row"><span class="label">Bank Name</span><span class="value" id="valBank">-</span></div>
      <div class="info-row"><span class="label">Account No</span><span class="value" id="valAcc">-</span></div>
      <div class="info-row"><span class="label">Skills</span><span class="value" id="valSkills">-</span></div>
    </div>

    <span class="section-title">Documents</span>
    <div class="card">
      <div class="info-row"><span class="label">IC / Passport Copy</span><span id="linkIC">-</span></div>
      <div class="info-row"><span class="label">Full Photo</span><span id="linkPhoto">-</span></div>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">🏠</a>
    <a href="attendance.html" class="nav-item">📊</a>
    <a href="profile.html" class="nav-item active">👤</a>
  </nav>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwrwJOWtdhgYXq68exQ_g3ilaEwtsePumDBPiBbQzr5hGgcFmtUrfNRzAx4ho8dYjQKyw/exec";

    function convertDriveLink(url) {
      if (!url) return "";
      const match = String(url).match(/\/file\/d\/([^/?]+)|id=([^&]+)/);
      const id = match ? (match[1] || match[2]) : null;
      return id ? `https://drive.google.com/uc?export=view&id=${id}` : url;
    }

    function renderProfile(data) {
      // Basic Text
      document.getElementById("dispName").textContent = (data.name_mykad || "Worker").toUpperCase();
      document.getElementById("dispID").textContent = data.mykad_passport_no || "";
      document.getElementById("valEmail").textContent = data.email || "-";
      document.getElementById("valPhone").textContent = data.phone || "-";
      document.getElementById("valGender").textContent = data.gender || "-";
      document.getElementById("valAddress").textContent = data.alamat || "-";
      document.getElementById("valBank").textContent = data.bank || "-";
      document.getElementById("valAcc").textContent = data.account_no || "-";
      document.getElementById("valSkills").textContent = data.kebolehan || "-";

      // Photos
      const imgUrl = convertDriveLink(data.photo_link);
      const fallback = "https://via.placeholder.com/200?text=MITEC";
      
      document.getElementById("mainPhoto").src = imgUrl || fallback;
      document.getElementById("headerPhoto").src = imgUrl || fallback;

      // File Links
      if (data.ic_link) {
        document.getElementById("linkIC").innerHTML = `<a href="${data.ic_link}" target="_blank" class="file-btn">View File</a>`;
      }
      if (data.photo_link) {
        document.getElementById("linkPhoto").innerHTML = `<a href="${data.photo_link}" target="_blank" class="file-btn">View File</a>`;
      }
    }

    async function loadProfile() {
      const docNo = localStorage.getItem("mcl_doc_no");
      if (!docNo) { window.location.href = "index.html"; return; }

      // Try local cache first for speed
      const cached = localStorage.getItem("mitecWorkerRecord");
      if (cached) renderProfile(JSON.parse(cached));

      // Fetch fresh data from Sheet
      try {
        const res = await fetch(`${WEB_APP_URL}?action=check_existing&doc_no=${encodeURIComponent(docNo)}`);
        const result = await res.json();
        if (result.ok && result.record) {
          renderProfile(result.record);
          localStorage.setItem("mitecWorkerRecord", JSON.stringify(result.record));
        }
      } catch (e) { console.error("Profile load failed", e); }
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }

    window.addEventListener("DOMContentLoaded", loadProfile);
  </script>
</body>
</html>
