<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MITEC Microsoft Fluent Dashboard</title>

<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>
:root {
  --fluent-bg: #F3F2F1; /* Classic Microsoft 365 background */
  --fluent-card: #FFFFFF;
  --fluent-text: #242424;
  --fluent-muted: #616161;
  --fluent-border: #E1DFDD;
  --fluent-primary: #0078D4; /* Signature Microsoft Blue */
  --fluent-primary-hover: #106EBE;
  --fluent-radius: 8px; /* Windows 11 standard corner radius */
  /* Complex Microsoft dual-shadow for depth */
  --fluent-shadow: 0 1.6px 3.6px 0 rgba(0,0,0,0.13), 0 0.3px 0.9px 0 rgba(0,0,0,0.11);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0; padding: 0 0 80px 0;
  background: var(--fluent-bg);
  /* Uses Windows system font specifically */
  font-family: 'Segoe UI', 'Segoe UI Web (West European)', -apple-system, sans-serif;
  color: var(--fluent-text);
}

.shell { width: 100%; max-width: 480px; margin: 0 auto; padding: 0 16px; }

/* Fluent Header */
.topbar {
  padding: 16px 0; margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.brandLogoLarge { width: 32px; height: 32px; object-fit: contain; }
.brandTitleSingle { flex: 1; font-size: 16px; font-weight: 600; color: var(--fluent-text); margin: 0; }
.headerPhoto { width: 32px; height: 32px; border-radius: 50%; }

/* The Productivity Hero (Less flashy, more data-driven) */
.hero {
  border-radius: var(--fluent-radius);
  padding: 20px; margin-bottom: 16px;
  background: var(--fluent-card);
  box-shadow: var(--fluent-shadow);
  border: 1px solid var(--fluent-border);
}
.heroClock { margin-bottom: 16px; }
.heroClockDate { font-size: 12px; color: var(--fluent-muted); margin-bottom: 2px; }
.heroClockTime { font-size: 28px; font-weight: 600; color: var(--fluent-primary); }

.heroTitle { margin: 0 0 4px; font-size: 18px; font-weight: 600; }
.heroText { margin: 0 0 20px; font-size: 14px; color: var(--fluent-muted); }

.heroActions { display: flex; gap: 8px; }

/* Fluent Standard Buttons */
.heroBtn {
  flex: 1; height: 32px; /* Shorter, tighter buttons */
  border-radius: 4px; border: 1px solid transparent;
  font-weight: 600; font-size: 14px; font-family: inherit;
  cursor: pointer; transition: all 0.1s;
}
.heroBtn:first-child { background: var(--fluent-primary); color: #fff; }
.heroBtn:first-child:hover { background: var(--fluent-primary-hover); }
.heroBtn:last-child { background: var(--fluent-card); color: var(--fluent-text); border-color: #8A8886; }
.heroBtn:last-child:hover { background: var(--fluent-bg); }

/* Fluent Surface Cards */
.card {
  background: var(--fluent-card);
  border-radius: var(--fluent-radius);
  border: 1px solid var(--fluent-border);
  box-shadow: var(--fluent-shadow);
  padding: 16px; margin-bottom: 16px;
}
.sectionTitle { margin: 0 0 16px 0; font-size: 14px; font-weight: 600; color: var(--fluent-text); }

.miniGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.miniBox { border-left: 3px solid var(--fluent-primary); padding-left: 12px; }
.miniLabel { font-size: 12px; color: var(--fluent-muted); margin-bottom: 4px; }
.miniValue { font-size: 20px; font-weight: 600; color: var(--fluent-text); }

/* Fluent List */
.rowList { display: flex; flex-direction: column; gap: 4px; }
.rowLink {
  width: 100%; border: none; border-radius: 4px;
  background: transparent; padding: 12px 8px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; text-align: left; font-family: inherit;
}
.rowLink:hover { background: var(--fluent-bg); }
.rowLinkContent { display: flex; align-items: center; gap: 16px; }
.rowIconBox { font-size: 20px; color: var(--fluent-primary); }
.rowTitle { font-size: 14px; font-weight: 600; color: var(--fluent-text); }
.rowSub { font-size: 12px; color: var(--fluent-muted); margin-top: 2px; }

.logoutBtn {
  width: 100%; height: 32px; border-radius: 4px; border: 1px solid transparent;
  background: transparent; color: #A4262C; font-weight: 600; font-size: 14px;
  font-family: inherit; cursor: pointer; text-align: left; padding: 0 8px;
}
.logoutBtn:hover { background: #FDE7E9; }

/* Fluent Flat Bottom Nav */
.bottomNav {
  position: fixed; left: 0; bottom: 0; width: 100%;
  background: var(--fluent-card); border-top: 1px solid var(--fluent-border);
  display: flex; justify-content: space-around; padding: 4px 0 16px 0;
}
.bottomNavItem {
  border: none; background: transparent; display: flex; flex-direction: column; align-items: center;
  font-size: 12px; color: var(--fluent-muted); font-family: inherit; padding: 8px 12px;
  border-bottom: 2px solid transparent; /* Microsoft uses bottom border for active states */
}
.bottomNavItem i { font-size: 20px; margin-bottom: 4px; }
.bottomNavItem.active { color: var(--fluent-primary); border-bottom-color: var(--fluent-primary); font-weight: 600; }
</style>
</head>

<body>
<div class="shell">
  <div class="topbar">
    <img class="brandLogoLarge" src="https://mitec.com.my/static/img/logos/mitec-new-logo.png" alt="MITEC Logo">
    <h1 class="brandTitleSingle">MITEC Labour</h1>
    <img id="headerPhoto" class="headerPhoto" src="https://ui-avatars.com/api/?name=Worker&background=0078D4&color=fff&size=200">
  </div>

  <section class="hero">
    <div class="heroClock">
      <div class="heroClockDate" id="liveDate">-</div>
      <div class="heroClockTime" id="liveTime">-</div>
    </div>
    <h2 class="heroTitle" id="heroName">Worker Name</h2>
    <p class="heroText">Dashboard and service records.</p>
    <div class="heroActions">
      <button class="heroBtn" onclick="goToPage('signin.html')">Sign In</button>
      <button class="heroBtn" onclick="window.location.href='https://forms.gle/cE6wDc2has6qvPhj7'">Sign Out</button>
    </div>
  </section>

  <div class="card">
    <h3 class="sectionTitle">Today's Ledger</h3>
    <div class="miniGrid">
      <div class="miniBox"><div class="miniLabel">Sign In</div><div class="miniValue" id="dashSignIn">-</div></div>
      <div class="miniBox"><div class="miniLabel">Sign Out</div><div class="miniValue" id="dashSignOut">-</div></div>
      <div class="miniBox"><div class="miniLabel">Voucher No.</div><div class="miniValue" id="dashVoucher">-</div></div>
      <div class="miniBox"><div class="miniLabel">Hours Logged</div><div class="miniValue" id="dashHours">-</div></div>
    </div>
  </div>

  <div class="card">
    <h3 class="sectionTitle">Systems & Records</h3>
    <div class="rowList">
      <button class="rowLink" onclick="goToPage('signin.html')">
        <div class="rowLinkContent"><i class="ph ph-file-text rowIconBox"></i><div><div class="rowTitle">Authentication</div><div class="rowSub">Record attendance protocol</div></div></div>
      </button>
      <button class="rowLink" onclick="goToPage('129.html')">
        <div class="rowLinkContent"><i class="ph ph-timer rowIconBox"></i><div><div class="rowTitle">Timekeeping</div><div class="rowSub">Digital clock-in / out</div></div></div>
      </button>
      <button class="rowLink" onclick="goToPage('profile.html')">
        <div class="rowLinkContent"><i class="ph ph-user-focus rowIconBox"></i><div><div class="rowTitle">Personnel Profile</div><div class="rowSub">Review registry data</div></div></div>
      </button>
    </div>
  </div>

  <button class="logoutBtn" onclick="logout()">Terminate Session</button>
</div>

<nav class="bottomNav">
  <button class="bottomNavItem active" onclick="goToPage('dashboard.html')"><i class="ph-fill ph-house"></i>Home</button>
  <button class="bottomNavItem" onclick="goToPage('129.html')"><i class="ph ph-clock"></i>Clock</button>
  <button class="bottomNavItem" onclick="goToPage('signin.html')"><i class="ph ph-file-text"></i>Sign In</button>
  <button class="bottomNavItem" onclick="goToPage('profile.html')"><i class="ph ph-user"></i>Profile</button>
</nav>

<script>
function goToPage(page) { window.location.href = page; }
function logout() { localStorage.removeItem("mitecWorkerRecord"); localStorage.removeItem("mcl_doc_no"); localStorage.removeItem("mcl_phone"); window.location.href = "index.html"; }
function startClock() {
  function update() {
    const now = new Date();
    document.getElementById("liveDate").textContent = now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
    document.getElementById("liveTime").textContent = now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", hour12: true });
  }
  update(); setInterval(update, 1000);
}
window.addEventListener("load", startClock);
</script>
</body>
</html>
