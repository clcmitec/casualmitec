<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MITEC Sign Out</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#fff;
  padding:24px;
  border-radius:16px;
  width:340px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h3{margin-bottom:16px;}

input{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#0b3f6f;
  color:#fff;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.status{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="card">
  <h3>Sign Out</h3>

  <input id="voucher" placeholder="Voucher No">

  <button onclick="submitSignOut()">Submit</button>

  <div class="status" id="status"></div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwrwJOWtdhgYXq68exQ_g3ilaEwtsePumDBPiBbQzr5hGgcFmtUrfNRzAx4ho8dYjQKyw/exec";

// get doc_no from login session
const docNo = localStorage.getItem("mcl_doc_no");

// block if not logged in
if(!docNo){
  alert("Please login first");
  window.location.href = "index.html";
}

async function submitSignOut(){

  const voucher = document.getElementById("voucher").value;
  const status = document.getElementById("status");

  if(!voucher){
    status.innerText = "Enter voucher number";
    return;
  }

  status.innerText = "Submitting...";

  try{
    const res = await fetch(`${APPS_SCRIPT_URL}?action=signOut&doc_no=${docNo}&voucher=${voucher}`);
    const data = await res.json();

    if(data.ok){
      status.innerText = "Sign Out recorded";

      // clear input
      document.getElementById("voucher").value = "";

      // optional: auto return to dashboard
      setTimeout(()=>{
        window.location.href = "dashboard.html";
      }, 1200);

    }else{
      status.innerText = data.message || "Error";
    }

  }catch(err){
    status.innerText = "Connection error";
  }
}
</script>

</body>
</html>
